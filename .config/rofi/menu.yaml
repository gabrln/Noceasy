menu:
  - name: "َ°–ں Web Apps"
    items:
      - name: "َ±‚¬ Dockhand"
        exec: "vivaldi --app=http://localhost:3000/"
      - name: "َ±ژ“ Mcsmanager"
        exec: "vivaldi --app=http://localhost:23333"
      - name: "َ°‘© Playit.gg"
        exec: "vivaldi --app=https://playit.gg/account/agents"
      - name: "َ°—ƒ YouTube"
        exec: "vivaldi --app=https://www.youtube.com"
      - name: "َ°—ƒ Pobreflix"
        exec: "vivaldi --app=https://www.pobreflixtv.stream/"
      - name: "َ°—ƒ Netflix"
        exec: "vivaldi --app=https://www.netflix.com"

  - name: "َ°†چ Terminal"
    items:
      - name: "َ°‍” Fastfetch"
        exec: "kitty -e bash -c 'fastfetch; read'"
      - name: "َ°©  IP Address"
        exec: "local_ip=$(ip addr show wlan0 2>/dev/null | awk '/inet / {split($2,a,\"/\"); print a[1]}'); pub_ip=$(curl -s -4 --max-time 3 ifconfig.me); notify-send 'َ°©  IP Address' \"wlan0: $local_ip\nPأ؛blico: $pub_ip\""
      - name: "َ°†“ Histأ³rico de Clipboard"
        exec: "kitty -e bash -c 'cliphist list | fzf | cliphist decode | wl-copy; notify-send \"َ°†“ Clipboard\" \"Item copiado!\"'"
      - name: "َ°®¯ Gerenciador de Pacotes"
        exec: "kitty -e paru"

  - name: "َ°’‹ Serviأ§os"
    items:
      - name: "َ°،¨ Docker"
        exec: "bash -c 'if systemctl is-active --quiet docker; then systemctl stop docker && notify-send \"َ°،¨ Docker\" Desligado; else systemctl start docker && notify-send \"َ°،¨ Docker\" Ligado; fi'"
      - name: "َ°’” SSH"
        exec: "bash -c 'if systemctl is-active --quiet sshd; then systemctl stop sshd && notify-send \"َ°’” SSH\" Desligado; else systemctl start sshd && notify-send \"َ°’” SSH\" Ligado; fi'"

  - name: "َ°’“ Config"
    items:
      - name: "َ°چœ Rofi Menu"
        exec: "kitty -e nvim ~/.config/rofi/menu.yaml"
      - name: "َ°کŒ Hyprland"
        exec: "kitty -e nvim ~/.config/hypr/hyprland.conf"
      - name: "َ°„› Kitty"
        exec: "kitty -e nvim ~/.config/kitty/kitty.conf"
      - name: "َ°’“ Zsh"
        exec: "kitty -e nvim ~/.zshrc"
