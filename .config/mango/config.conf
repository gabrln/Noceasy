# Import Noctalia-generated theme
source=~/.config/mango/noctalia.conf

# Blur and shadows (Mango SceneFX settings for cleaner Noctalia surfaces)
blur=1
blur_layer=1
blur_optimized=0
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.0

# Borders
borderpx=2
border_radius=10
gappih=5
gappiv=5
gappoh=5
gappov=5

# Animations
animations=1
animation_duration_open=80
animation_duration_close=80
animation_duration_move=80
animation_duration_tag=80
animation_curve_open=0.25,0.1,0.25,1.0
animation_curve_close=0.25,0.1,0.25,1.0
animation_curve_move=0.25,0.1,0.25,1.0
animation_curve_tag=0.25,0.1,0.25,1.0
animation_type_open=fade
animation_type_close=fade

shadows=1
layer_shadows=0
shadow_only_floating=1
shadows_size=12
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

# Environment Variables
env=XCURSOR_THEME,Bibata-Modern-Classic
env=XCURSOR_SIZE,24
env=XKB_DEFAULT_LAYOUT,br
env=QT_QPA_PLATFORMTHEME,qt6ct
# Input: Mouse
cursor_theme=Bibata-Modern-Classic
cursor_size=24
mouse_accel_profile=1
mouse_accel_speed=-0.4
numlockon=1

# Autostart Services
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=gnome-keyring-daemon --start --components=secrets
exec-once=wl-clip-persist --clipboard regular --reconnect-tries 0 &
exec-once=noctalia --daemon
exec-once=wl-paste --watch cliphist store
exec-once=flatpak run com.github.wwmm.easyeffects --gapplication-service

# Window Rules for Named Scratchpads
windowrule=isnamedscratchpad:1,width:1600,height:900,appid:kitty-drop
windowrule=isnamedscratchpad:1,width:1400,height:800,appid:btop-scratch
windowrule=isnamedscratchpad:1,width:1280,height:720,appid:keyhints-scratch

# Base Bindings
bind=SUPER,Return,spawn_shell,kitty --title Kitty
bind=SUPER,b,spawn_shell,firefox
bind=SUPER,e,spawn_shell,kitty -e yazi
bind=SUPER,d,spawn_shell,noctalia msg panel-toggle launcher
bind=SUPER,v,spawn_shell,noctalia msg panel-toggle clipboard
bind=SUPER,p,spawn_shell,noctalia msg panel-toggle control-center
bind=SUPER+SHIFT,p,spawn_shell,noctalia msg panel-toggle session
bind=SUPER+SHIFT,n,spawn_shell,noctalia msg panel-toggle control-center notifications
bind=SUPER+SHIFT,e,spawn_shell,nautilus
bind=SUPER,i,spawn_shell,noctalia msg settings-toggle
bind=SUPER,n,spawn_shell,noctalia msg nightlight-toggle
bind=SUPER,y,spawn_shell,noctalia msg caffeine-toggle
bind=SUPER,w,spawn_shell,noctalia msg wallpaper-random
bind=SUPER+SHIFT,t,spawn_shell,noctalia msg theme-mode-toggle
bind=CTRL+ALT,l,spawn_shell,noctalia msg session lock
bind=SUPER,F2,spawn_shell,noctalia msg mic-mute

# Help Cheatsheets & Window Info
bind=SUPER,h,toggle_named_scratchpad,keyhints-scratch,none,kitty --class keyhints-scratch -e $HOME/.config/mango/scripts/KeyHints.sh
bind=SUPER+SHIFT,d,spawn_shell,$HOME/.config/mango/scripts/WindowInfo.sh

# Hardware & Media Keys
bind=NONE,XF86AudioRaiseVolume,spawn_shell,noctalia msg volume-up
bind=NONE,XF86AudioLowerVolume,spawn_shell,noctalia msg volume-down
bind=NONE,XF86AudioMute,spawn_shell,noctalia msg volume-mute
bind=NONE,XF86MonBrightnessUp,spawn_shell,noctalia msg brightness-up
bind=NONE,XF86MonBrightnessDown,spawn_shell,noctalia msg brightness-down
bind=NONE,XF86AudioPlay,spawn_shell,noctalia msg media toggle
bind=NONE,XF86AudioPause,spawn_shell,noctalia msg media toggle
bind=NONE,XF86MediaPlayPause,spawn_shell,noctalia msg media toggle
bind=NONE,XF86AudioNext,spawn_shell,noctalia msg media next
bind=NONE,XF86AudioPrev,spawn_shell,noctalia msg media previous
bind=NONE,XF86AudioStop,spawn_shell,noctalia msg media stop

# Screenshots (via Noctalia IPC)
bind=SUPER,Print,spawn_shell,noctalia msg screenshot-fullscreen
bind=SUPER+SHIFT,Print,spawn_shell,noctalia msg screenshot-region
bind=ALT,Print,spawn_shell,noctalia msg screenshot-fullscreen pick

# Window Management
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,q,killclient,
bind=SUPER,f,togglefullscreen,
bind=SUPER,m,togglemaximizescreen,
bind=SUPER,space,togglefloating,
bind=SUPER,o,toggleoverlay,
bind=SUPER,r,reload_config
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev

# Named Scratchpads
bind=SUPER+SHIFT,Return,toggle_named_scratchpad,kitty-drop,none,kitty --class kitty-drop
bind=SUPER,F1,toggle_named_scratchpad,btop-scratch,none,kitty --class btop-scratch -e btop

# Standard Scratchpad
bind=SUPER,u,toggle_scratchpad
bind=SUPER+SHIFT,u,minimized
bind=SUPER+CTRL,u,restore_minimized

# Directional focus
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Move window
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# Resize window
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50

# Layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# Mouse & Scroll Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Tag switching (Mnemonic Workspaces)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0
bind=SUPER,0,view,10,0

# Moving clients to tags
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0
bind=SUPER+SHIFT,0,tag,10,0

# Overview & Window Switching
bind=ALT,Tab,toggleoverview,
bind=SUPER,Tab,viewtoright,0
bind=SUPER+SHIFT,Tab,viewtoleft,0
bind=CTRL+ALT,Delete,quit,

# Auxiliary scripts
bind=ALT,F4,spawn_shell,$HOME/.config/mango/scripts/AltF4.sh
bind=SUPER+SHIFT,b,spawn_shell,$HOME/.config/mango/scripts/ToggleBlur.sh
bind=SUPER+SHIFT,g,spawn_shell,$HOME/.config/mango/scripts/ToggleGamemode.sh

# Dynamic settings overrides
source-optional=~/.config/mango/dyn_settings.conf
