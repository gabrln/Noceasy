# Mapping of repository dotfiles to the user's HOME directory

[directories]
# Directories copied from .config/<name> to ~/.config/<name>
configs = [
  "kitty",
  "herdr",
  "yazi",
  "fastfetch",
  "gtk-3.0",
  "gtk-4.0",
  "xdg-desktop-portal",
  "docker",
  "hypr",
  "noctalia",
  "nvim",
  "qt6ct",
  "pypr",
  "zellij",
]

[special]
# zsh: copied completely, but existing plugins/ directory must be preserved
zsh = { source = "zsh", preserve = ["plugins"] }

[files]
# Standalone files copied to specific destination paths (.zshenv is stored inside repo .config/zsh/ and placed at $HOME/.zshenv)
".config/zsh/.zshenv" = "$HOME/.zshenv"
".config/mimeapps.list" = "$HOME/.config/mimeapps.list"

[xdg_dirs]
# Directories created via xdg-user-dirs-update and mkdir
extra = [
  "$HOME/Pictures/Screenshots",
  "$HOME/Pictures/Wallpapers",
  "$HOME/Projects",
  "$HOME/Documents/Notes",
  "$HOME/AppImage",
]
